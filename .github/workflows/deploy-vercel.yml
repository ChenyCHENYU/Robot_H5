# 自动部署到 Vercel（生产环境）
# 触发条件：push 到 main 分支（跳过 release 机器人自身产生的提交）
#
# 首次使用前，需在 GitHub 仓库 Settings → Secrets and variables → Actions 添加：
#   VERCEL_TOKEN      — Vercel 控制台 Account Settings → Tokens 创建
#   VERCEL_ORG_ID     — 本地运行 `npx vercel link` 后从 .vercel/project.json 取得
#   VERCEL_PROJECT_ID — 同上
name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    # 跳过 release bot 产生的 chore(release) 提交（由 release.yml 已 push，避免重复触发）
    if: "!startsWith(github.event.head_commit.message, 'chore(release)')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm run type-check

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
